<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Estate — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f2137;
      --navy-light: #1a3352;
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --cream: #f8f4ef;
      --text: #1a1a2e;
      --muted: #6b7280;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--white);
      box-shadow: 0 0 60px rgba(0,0,0,0.12);
      position: relative;
    }

    .header {
      background: var(--navy);
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--navy);
      font-weight: 600;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--white);
      font-weight: 600;
      line-height: 1.2;
    }

    .header-sub {
      font-size: 11px;
      color: var(--gold-light);
      margin-top: 2px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .meeting-banner {
      background: linear-gradient(135deg, var(--gold) 0%, #a07830 100%);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .meeting-text {
      font-size: 12px;
      color: var(--navy);
      font-weight: 500;
      line-height: 1.3;
    }

    .meeting-btn {
      background: var(--navy);
      color: var(--gold-light);
      border: none;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .meeting-btn:hover { opacity: 0.85; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--navy);
      font-weight: 600;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-avatar.user-av {
      background: var(--navy);
      color: var(--gold);
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble.agent {
      background: var(--white);
      color: var(--text);
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid #f0ede8;
    }

    .bubble.user {
      background: var(--navy);
      color: var(--white);
      border-radius: 18px 18px 4px 18px;
    }

    .bubble a {
      color: var(--gold);
      text-decoration: underline;
      word-break: break-all;
    }

    .bubble.user a { color: var(--gold-light); }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 14px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin: 4px 0;
      letter-spacing: 0.5px;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .quick-btn {
      background: var(--cream);
      border: 1.5px solid var(--gold);
      color: var(--navy);
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .quick-btn:hover { background: var(--gold); color: var(--navy); }

    .input-area {
      padding: 12px 16px 16px;
      background: var(--white);
      border-top: 1px solid #f0ede8;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      border: 1.5px solid #e5e1da;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      color: var(--text);
      background: var(--cream);
      transition: border-color 0.2s;
    }

    .input-box:focus { border-color: var(--gold); }
    .input-box::placeholder { color: #9ca3af; }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--navy);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover { background: var(--navy-light); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: var(--gold); }

    .powered {
      text-align: center;
      font-size: 10px;
      color: #c4c0ba;
      padding-bottom: 6px;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .page { max-width: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="avatar">AR</div>
    <div class="header-info">
      <div class="header-name">Ahmed Raza</div>
      <div class="header-sub">Real Estate Agent · Prime Estate Lahore</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="meeting-banner">
    <div class="meeting-text">📅 Want to schedule a visit or meeting?</div>
    <a class="meeting-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSckG-ENl_TD0mH7g3BUSRYJrs38gW2dJWrDA4v2euv18ng7FA/viewform" target="_blank">Book Now →</a>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="date-divider">Today</div>
    <div class="msg-row agent">
      <div class="msg-avatar">AR</div>
      <div>
        <div class="bubble agent">Hi there! 👋 I'm Ahmed Raza from Prime Estate Lahore. How can I help you today?</div>
        <div class="quick-replies">
          <button class="quick-btn" onclick="sendQuick('I want to buy a property')">🏠 Buy</button>
          <button class="quick-btn" onclick="sendQuick('I want to rent a property')">🔑 Rent</button>
          <button class="quick-btn" onclick="sendQuick('I want to sell my property')">💰 Sell</button>
          <button class="quick-btn" onclick="sendQuick('I want to book a meeting')">📅 Meeting</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea class="input-box" id="userInput" placeholder="Type your message..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by Prime Estate AI · Available 24/7</div>

</div>

<script>
  const WEBHOOK = 'https://n8n-production-7001.up.railway.app/webhook/d8f1ac41-c557-4669-aa9a-7a3acd2d7401/chat';
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

  userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendQuick(text) {
    userInput.value = text;
    sendMessage();
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`)
      .replace(/\n/g, '<br>');
  }

  function addMessage(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const av = document.createElement('div');
    av.className = 'msg-avatar' + (role === 'user' ? ' user-av' : '');
    av.textContent = role === 'user' ? 'U' : 'AR';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.innerHTML = linkify(text);

    row.appendChild(av);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    scrollBottom();
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row agent';
    row.id = 'typingRow';
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'AR';
    const bubble = document.createElement('div');
    bubble.className = 'bubble agent';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(av);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typingRow');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = '';
    userInput.style.height = 'auto';
    addMessage(text, 'user');
    addTyping();

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text, sessionId, action: 'sendMessage' })
      });
      removeTyping();
      if (!res.ok) throw new Error('error');
      const data = await res.json();
      const reply = data.output || data.text || data.message || 'How can I help you further?';
      addMessage(reply, 'agent');
    } catch {
      removeTyping();
      addMessage('Sorry, having trouble connecting. Please try again shortly.', 'agent');
    }
  }
</script>
</body>
</html>
